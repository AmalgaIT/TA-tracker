    :root {
      --bg: #F2F5FA;
      --surface: #FFFFFF;
      --surface2: #F7F9FC;
      --primary: #1A3D6B;
      --primary-light: #2457A0;
      --accent: #0BAFB8;
      --accent2: #0891B2;
      --green: #059669;
      --green-light: #D1FAE5;
      --amber: #D97706;
      --amber-light: #FEF3C7;
      --red: #DC2626;
      --red-light: #FEE2E2;
      --border: #DDE3ED;
      --border2: #C8D1E0;
      --text: #0F1C2E;
      --text2: #4A5568;
      --text3: #8896AB;
      --shadow-sm: 0 1px 3px rgba(26,61,107,0.08), 0 1px 2px rgba(26,61,107,0.04);
      --shadow: 0 4px 16px rgba(26,61,107,0.10), 0 1px 4px rgba(26,61,107,0.06);
      --shadow-lg: 0 10px 40px rgba(26,61,107,0.14), 0 4px 12px rgba(26,61,107,0.08);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── SETUP MODAL ─────────────────────────── */
    .setup-overlay {
      position: fixed; inset: 0;
      background: rgba(10,22,40,0.55);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .setup-overlay.hidden { display: none; }
    .setup-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 540px;
      max-width: 95vw;
      overflow: hidden;
    }
    .setup-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 28px 32px;
      color: #fff;
    }
    .setup-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .setup-header p { font-size: 13px; opacity: 0.75; }
    .setup-body { padding: 28px 32px; }
    .setup-step {
      display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start;
    }
    .step-num {
      min-width: 26px; height: 26px;
      background: var(--accent);
      color: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin-top: 2px;
    }
    .step-content { flex: 1; }
    .step-content strong { font-weight: 600; color: var(--text); }
    .step-content p { font-size: 12.5px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
    .step-content a { color: var(--accent2); text-decoration: none; }
    .step-content a:hover { text-decoration: underline; }
    .setup-fields { margin-top: 20px; display: flex; flex-direction: column; gap: 14px; }
    .setup-fields label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .setup-fields input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Mono', monospace;
      font-size: 12.5px; color: var(--text);
      background: var(--surface2);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .setup-fields input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(11,175,184,0.15); }
    .setup-footer { padding: 0 32px 28px; }
